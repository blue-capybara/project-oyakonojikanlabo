<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>記事投稿</title>
<meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
<link rel="stylesheet" href="bower_components/bootstrap/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="bower_components/font-awesome/css/font-awesome.min.css">
<link rel="stylesheet" href="bower_components/Ionicons/css/ionicons.min.css">
<link rel="stylesheet" href="bower_components/select2/dist/css/select2.min.css">
<link rel="stylesheet" href="plugins/write-scripts/css/writer-script.css">
<link rel="stylesheet" href="dist/css/skins/skin-black-light.min.css">
<link rel="stylesheet" href="dist/css/AdminLTE.min.css">
<!-- Google Font -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700,300italic,400italic,600italic">
<!-- Writer Scripts -->
</head>
<body class="hold-transition skin-black-light sidebar-mini">
<div class="wrapper">
	<!-- Main Header -->
	<header class="main-header">
		<!-- Logo -->
		<a href="" class="logo">
			<!-- mini logo for sidebar mini 50x50 pixels -->
			<span class="logo-mini">WP</span>
			<!-- logo for regular state and mobile devices -->
			<span class="logo-lg">Writer Panel</span>
		</a>
		<!-- Header Navbar -->
		<nav class="navbar navbar-static-top" role="navigation">
			<!-- Sidebar toggle button-->
			<a href="#" class="sidebar-toggle" data-toggle="push-menu" role="button">
				<span class="sr-only">Toggle navigation</span>
			</a>
			<!-- Navbar Right Menu -->
			<div class="navbar-custom-menu">
				<ul class="nav navbar-nav">
					<!-- User Account Menu -->
					<li class="dropdown user">
						<!-- Menu Toggle Button -->
						<a href="#" class="dropdown-toggle" data-toggle="dropdown">
							<!-- hidden-xs hides the username on small devices so only the image appears. -->
							<span>○○さん</span>
						</a>
						<ul class="dropdown-menu" aria-labelledby="dropdownMenu1">
							<li><a href="#">ログアウト</a></li>
							<li><a href="#">サイトを確認</a></li>
						</ul>
					</li>
				</ul>
			</div>
		</nav>
	</header>
	<!-- Left side column. contains the logo and sidebar -->
	<aside class="main-sidebar">
		<!-- sidebar: style can be found in sidebar.less -->
		<section class="sidebar">
			<!-- Sidebar Menu -->
			<ul class="sidebar-menu" data-widget="tree">
				<!-- Optionally, you can add icons to the links -->
				<li><a href="#"><i class="fa fa-tachometer"></i> <span>ダッシュボード</span></a></li>
				<li><a href="#"><i class="fa fa-list"></i> <span>お知らせ一覧</span></a></li>
				<li class="treeview">
					<a href="#"><i class="fa fa-pencil"></i> <span>記事</span> <span class="pull-right-container"><i class="fa fa-angle-left pull-right"></i></span></a>
					<ul class="treeview-menu">
						<li><a href="#">一覧</a></li>
						<li><a href="#">新規作成</a></li>
					</ul>
				</li>
				<li class="treeview">
					<a href="#"><i class="fa fa-commenting"></i> <span>メッセージ</span> <span class="pull-right-container"><i class="fa fa-angle-left pull-right"></i></span></a>
					<ul class="treeview-menu">
						<li><a href="#">一覧</a></li>
						<li><a href="#">新規作成</a></li>
					</ul>
				</li>
				<li><a href="#"><i class="fa fa-user"></i> <span>プロフィール変更</span></a></li>
				<li><a href="#"><i class="fa fa-usd"></i> <span>請求書作成</span></a></li>
			</ul>
			<!-- /.sidebar-menu -->
		</section>
		<!-- /.sidebar -->
	</aside>
	<!-- Content Wrapper. Contains page content -->
	<div class="content-wrapper">
		<!-- Content Header (Page header) -->
		<section class="content-header">
			<h1><i class="fa fa-pencil"></i> 記事投稿</h1>
			<ol class="breadcrumb">
				<li><a href="#"><i class="fa fa-dashboard"></i> ダッシュボード</a></li>
				<li class="active">記事投稿</li>
			</ol>
		</section>
		<!-- Main content -->
		<section class="content container-fluid">
			<form role="form">
				<div class="box ">
					<div class="box-header with-border">
						<h3 class="box-title">基本情報</h3>
					</div>
					<!-- /.box-header -->
					<div class="box-body">
						<!-- text input -->
						<div class="form-group">
							<label>タイトル</label>
							<input type="text" class="form-control" placeholder="Enter ...">
						</div>
						<div class="form-group">
							<label>カテゴリー</label>
							<select class="form-control select2" style="width: 100%;">
								<option selected="selected">Alabama</option>
								<option>Alaska</option>
								<option>California</option>
								<option>Delaware</option>
								<option>Tennessee</option>
								<option>Texas</option>
								<option>Washington</option>
							</select>
						</div>
						<!-- textarea -->
						<div class="form-group">
							<label>アイキャッチ画像</label>
							<input type="file">
						</div>
					</div>
					<!-- /.box-body -->
				</div>
				<!-- /.box -->
				<div class="box writer-form">
					<div class="box-header with-border">
						<h3 class="box-title">コンテンツ</h3>
					</div>
					<!-- /.box-header -->
					<div class="box-body">
						<div class="editable-content"></div>
					</div>
					<!-- /.box-body -->
					<div class="box-footer">
						<div class="row">
							<div class="col-md-5 col-md-offset-2 col-sm-12 m-b-md-0 m-b-xs-2">
								<select class="form-control js-block-list">
									<option value="">パーツ名を選択</option>
									<option value="catch_1">大見出し</option>
									<option value="catch_2">子見出し</option>
									<option value="image">画像</option>
									<option value="text">テキスト</option>
									<option value="image_with_text">画像＋テキスト</option>
									<option value="quote">引用テキスト</option>
									<option value="youtube">Youtube動画</option>
									<option value="twitter">Twitter投稿</option>
									<!--<option value="pintarest">Pintarest（ピン）</option>-->
									<option value="instagram">Instagram</option>
								</select>
							</div>
							<div class="col-md-3 col-sm-12">
								<button class="btn btn-info btn-block js-append-block">ブロックを追加</button>
							</div>
						</div>
					</div>
					<!-- /.box-footer -->
				</div>
				<!-- /.box -->
				<div class="box box-danger">
					<div class="box-header with-border">
						<h3 class="box-title">公開</h3>
					</div>
					<!-- /.box-header -->
					<div class="box-body">
						<div class="row">
							<div class="col-md-3 col-sm-12 m-b-md-0 m-b-xs-2">
								<button class="btn btn-warning btn-block js-append-block">納品申請</button>
							</div>
							<div class="col-md-3 col-sm-6 m-b-md-0 m-b-xs-2">
								<button class="btn btn-primary btn-block js-append-block">下書き保存</button>
							</div>
							<div class="col-md-3 col-sm-6 m-b-md-0 m-b-xs-2">
								<button class="btn btn-primary btn-block js-append-block">プレビュー</button>
							</div>
							<div class="col-md-3 col-sm-12">
								<button class="btn btn-danger btn-block js-append-block">削除</button>
							</div>
						</div>
					</div>
					<!-- /.box-body -->
				</div>
				<!-- /.box -->
			</form>
		</section>
		<!-- /.content -->
	</div>
	<!-- /.content-wrapper -->
	<!-- Main Footer -->
	<footer class="main-footer">
		<!-- To the right -->
		<div class="pull-right hidden-xs">
			Anything you want
		</div>
		<!-- Default to the left -->
		<strong>Copyright &copy; 2016 <a href="#">親子の時間研究所</a>.</strong> All rights reserved.
	</footer>
</div>
<!-- ./wrapper -->
<script src="bower_components/jquery/dist/jquery.min.js"></script>
<script src="bower_components/jquery-ui/jquery-ui.min.js"></script>
<script src="bower_components/bootstrap/dist/js/bootstrap.min.js"></script>
<script src="bower_components/select2/dist/js/select2.full.min.js"></script>
<script src="plugins/micro-template/micro-template.js"></script>
<script src="plugins/write-scripts/js/writer-scripts.js"></script>
<script src="dist/js/adminlte.min.js"></script>
<script>
	$(function () {
		$('.select2').select2();

		new WriterScript({
			blockSelectClass: '.js-block-list',
			appendBtnClass: '.js-append-block'
		});
	})
</script>
</body>
</html>
