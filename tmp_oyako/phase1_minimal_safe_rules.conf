# ==============================================
# Phase 1: 最小ルールセット（安全版）
# 置き場所: SPA fallback より前
# ==============================================

# HTTPS 強制（プロキシ対応・ループ回避）
RewriteCond %{HTTPS} !=on
RewriteCond %{HTTP:X-Forwarded-Proto} !https [NC]
RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

# 追跡パラメータ除去（正規URLへ301）
RewriteCond %{QUERY_STRING} (^|&)(utm_[^=]+|fbclid|gclid|yclid|_ga|_gl|openExternalBrowser|ssp_iabi)=[^&]* [NC]
RewriteRule ^ %{REQUEST_URI}? [R=301,L,NE]

# 旧WordPress検索クエリ -> 新検索URL
RewriteCond %{REQUEST_URI} ^/$
RewriteCond %{QUERY_STRING} (^|&)s=([^&]+)(&|$) [NC]
RewriteRule ^$ /search/?q=%2 [R=301,L,NE]

# 旧WordPress投稿IDクエリは410（移行先なし）
RewriteCond %{REQUEST_URI} ^/$
RewriteCond %{QUERY_STRING} (^|&)p=[0-9]+(&|$) [NC]
RewriteRule ^$ - [G,L]

# URL構造の正規化
RewriteRule ^tags/([^/]+)/?$ /tag/$1/ [R=301,L,NE]
RewriteRule ^tag/([^/]+)/page/[0-9]+/?$ /tag/$1/ [R=301,L,NE]
RewriteRule ^search/([^/]+)/?$ /search/?q=$1 [R=301,L,NE,B]

# 旧WP構造（高確度で不要）
RewriteRule ^category(?:/.*)?$ - [G,L,NC]
RewriteRule ^author(?:/.*)?$ - [G,L,NC]
RewriteRule ^page/[0-9]+/?$ - [G,L,NC]
RewriteRule ^wp-content(?:/.*)?$ - [G,L,NC]
RewriteRule ^wp-includes(?:/.*)?$ - [G,L,NC]
RewriteRule ^wp-json(?:/.*)?$ - [G,L,NC]
RewriteRule ^xmlrpc\.php$ - [G,L,NC]
RewriteRule ^search/.+/feed(?:/(?:atom|rss2))?/?$ - [G,L,NC]
RewriteRule ^search/.+/page/[0-9]+/?$ - [G,L,NC]
RewriteRule ^tag/.+/feed(?:/(?:atom|rss2))?/?$ - [G,L,NC]

# page/?instaXXXX のような派生URL
RewriteCond %{REQUEST_URI} ^/page/[0-9]+/?$ [NC]
RewriteCond %{QUERY_STRING} (^|&)insta[0-9]*($|[=&]) [NC]
RewriteRule ^ - [G,L]

# 既知の旧イベントURL（移行先あり）
RewriteRule ^events/uca/?$ /event/uca/ [R=301,L,NE]
